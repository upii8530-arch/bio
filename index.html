<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codein Bio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      perspective: 1000px;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      z-index: -100;
      transform: translate(-50%, -50%);
      object-fit: cover;
      filter: brightness(0.34) saturate(1.12) contrast(1.05);
      background: #000;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -90;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(119, 91, 255, 0.16), transparent 30%),
        radial-gradient(circle at 80% 25%, rgba(255, 120, 190, 0.12), transparent 28%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.55));
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: -80;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -20px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.65);
      animation: particleUp linear infinite;
      opacity: 0;
    }

    .particle:nth-child(1)  { left: 4%;  animation-duration: 10s; animation-delay: -1s; }
    .particle:nth-child(2)  { left: 10%; animation-duration: 13s; animation-delay: -5s; }
    .particle:nth-child(3)  { left: 16%; animation-duration: 9s;  animation-delay: -2s; }
    .particle:nth-child(4)  { left: 23%; animation-duration: 12s; animation-delay: -6s; }
    .particle:nth-child(5)  { left: 30%; animation-duration: 11s; animation-delay: -3s; }
    .particle:nth-child(6)  { left: 38%; animation-duration: 14s; animation-delay: -8s; }
    .particle:nth-child(7)  { left: 45%; animation-duration: 10s; animation-delay: -4s; }
    .particle:nth-child(8)  { left: 52%; animation-duration: 12s; animation-delay: -7s; }
    .particle:nth-child(9)  { left: 58%; animation-duration: 15s; animation-delay: -9s; }
    .particle:nth-child(10) { left: 64%; animation-duration: 11s; animation-delay: -2s; }
    .particle:nth-child(11) { left: 70%; animation-duration: 13s; animation-delay: -6s; }
    .particle:nth-child(12) { left: 76%; animation-duration: 9s;  animation-delay: -4s; }
    .particle:nth-child(13) { left: 82%; animation-duration: 14s; animation-delay: -10s; }
    .particle:nth-child(14) { left: 88%; animation-duration: 12s; animation-delay: -5s; }
    .particle:nth-child(15) { left: 93%; animation-duration: 10s; animation-delay: -7s; }
    .particle:nth-child(16) { left: 97%; animation-duration: 16s; animation-delay: -11s; }

    @keyframes particleUp {
      0% { transform: translateY(0) scale(0.75); opacity: 0; }
      15% { opacity: 0.85; }
      85% { opacity: 0.45; }
      100% { transform: translateY(-110vh) scale(1.4); opacity: 0; }
    }

    #enter-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      cursor: pointer;
      transition: 0.8s ease;
    }

    #enter-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .enter-text {
      font-size: 14px;
      letter-spacing: 8px;
      text-transform: uppercase;
      opacity: 0.65;
      animation: pulse 2s infinite;
      user-select: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.85; }
    }

    .audio-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      width: 45px;
      height: 45px;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 10px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.4s;
    }

    .audio-container:hover {
      width: 150px;
    }

    .speaker-icon {
      min-width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
    }

    svg {
      fill: white;
      width: 18px;
      height: 18px;
    }

    .volume-slider {
      margin-left: 15px;
      width: 80px;
      opacity: 0;
      transition: 0.3s;
      accent-color: #8a2be2;
      cursor: pointer;
    }

    .audio-container:hover .volume-slider {
      opacity: 1;
    }

    .main-container {
      position: relative;
      z-index: 10;
      width: min(550px, calc(100vw - 34px));
      display: flex;
      flex-direction: column;
      gap: 15px;
      transform-style: preserve-3d;
      will-change: transform;
      animation: fadeOnly 0.7s ease both;
    }

    .header-panel,
    .content-panel {
      width: 100%;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.34);
    }

    .header-panel::before,
    .content-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.10), transparent 30%),
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 42%);
      opacity: 0.8;
    }

    .header-panel {
      min-height: 92px;
      border-radius: 20px;
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      transform: translateZ(30px);
    }

    .user-block {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
    }

    .avatar-container {
      position: relative;
      width: 62px;
      height: 62px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 62px;
    }

    .avatar {
      position: relative;
      z-index: 2;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,0,0,0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      background: #111;
    }

    .name-stack {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nickname {
      color: #fff;
      font-size: 30px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.5px;
      text-transform: none;
      text-shadow: 0 0 10px rgba(138, 43, 226, 0.42), 0 8px 22px rgba(0,0,0,0.42);
      white-space: nowrap;
    }

    .mini-meta {
      color: rgba(255,255,255,0.62);
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .content-panel {
      height: 230px;
      border-radius: 25px;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transform: translateZ(15px);
    }

    .content-inner {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .section-label {
      margin-bottom: 22px;
      color: rgba(255,255,255,0.48);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .desc {
      max-width: 420px;
      margin: 0 auto;
      color: rgba(255,255,255,0.84);
      font-style: italic;
      font-size: 16px;
      line-height: 1.75;
      text-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .decor-row {
      width: min(260px, 80%);
      height: 1px;
      margin: 25px auto 0;
      position: relative;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    }

    .decor-row::before,
    .decor-row::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.76);
      box-shadow: 0 0 16px rgba(255,255,255,0.45);
      transform: translateY(-50%);
    }

    .decor-row::before { left: 25%; }
    .decor-row::after { right: 25%; }

    .watermark {
      position: absolute;
      z-index: 1;
      right: 25px;
      bottom: 15px;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      color: rgba(138, 43, 226, 0.18);
      pointer-events: none;
      user-select: none;
    }

    @keyframes fadeOnly {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 560px) {
      .main-container {
        width: min(430px, calc(100vw - 28px));
      }

      .header-panel {
        min-height: 88px;
        padding: 14px 18px;
      }

      .avatar-container {
        width: 62px;
        height: 62px;
        flex-basis: 62px;
      }

      .avatar {
        width: 52px;
        height: 52px;
      }

      .nickname {
        font-size: 25px;
      }

      .mini-meta {
        font-size: 10px;
        letter-spacing: 2px;
      }

      .content-panel {
        height: 220px;
        padding: 26px 22px;
      }

      .desc {
        font-size: 15px;
      }

      .audio-container:hover {
        width: 45px;
      }

      .audio-container:hover .volume-slider {
        opacity: 0;
      }
    }
  

    /* prettier particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: -80;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      bottom: -30px;
      width: var(--size, 4px);
      height: var(--size, 4px);
      border-radius: 50%;
      opacity: 0;
      background: rgba(255, 255, 255, 0.86);
      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.72),
        0 0 28px var(--glow, rgba(170, 120, 255, 0.45));
      animation:
        particleUp var(--duration, 12s) linear infinite,
        particleTwinkle 2.8s ease-in-out infinite;
      animation-delay: var(--delay, 0s), var(--twinkle-delay, 0s);
    }

    .particle:nth-child(3n) {
      background: rgba(190, 215, 255, 0.9);
      --glow: rgba(100, 160, 255, 0.55);
    }

    .particle:nth-child(4n) {
      background: rgba(255, 210, 245, 0.9);
      --glow: rgba(255, 120, 210, 0.45);
    }

    .particle:nth-child(5n) {
      background: rgba(230, 255, 245, 0.9);
      --glow: rgba(120, 255, 210, 0.38);
    }

    .particle:nth-child(1)  { left: 3%;  --size: 3px; --duration: 11s; --delay: -1s;  --drift: 28px; --twinkle-delay: -1.2s; }
    .particle:nth-child(2)  { left: 7%;  --size: 5px; --duration: 15s; --delay: -7s;  --drift: -34px; --twinkle-delay: -2.1s; }
    .particle:nth-child(3)  { left: 11%; --size: 4px; --duration: 10s; --delay: -3s;  --drift: 46px; --twinkle-delay: -0.4s; }
    .particle:nth-child(4)  { left: 15%; --size: 2px; --duration: 13s; --delay: -9s;  --drift: -18px; --twinkle-delay: -2.8s; }
    .particle:nth-child(5)  { left: 19%; --size: 6px; --duration: 17s; --delay: -5s;  --drift: 38px; --twinkle-delay: -1.7s; }
    .particle:nth-child(6)  { left: 23%; --size: 3px; --duration: 12s; --delay: -8s;  --drift: -45px; --twinkle-delay: -0.9s; }
    .particle:nth-child(7)  { left: 27%; --size: 4px; --duration: 14s; --delay: -2s;  --drift: 32px; --twinkle-delay: -2.4s; }
    .particle:nth-child(8)  { left: 31%; --size: 2px; --duration: 9s;  --delay: -6s;  --drift: -26px; --twinkle-delay: -1.1s; }
    .particle:nth-child(9)  { left: 35%; --size: 5px; --duration: 16s; --delay: -11s; --drift: 50px; --twinkle-delay: -2.0s; }
    .particle:nth-child(10) { left: 39%; --size: 3px; --duration: 12s; --delay: -4s;  --drift: -38px; --twinkle-delay: -0.6s; }
    .particle:nth-child(11) { left: 43%; --size: 4px; --duration: 18s; --delay: -12s; --drift: 22px; --twinkle-delay: -1.8s; }
    .particle:nth-child(12) { left: 47%; --size: 2px; --duration: 10s; --delay: -1s;  --drift: -30px; --twinkle-delay: -2.6s; }
    .particle:nth-child(13) { left: 51%; --size: 6px; --duration: 15s; --delay: -10s; --drift: 42px; --twinkle-delay: -1.4s; }
    .particle:nth-child(14) { left: 55%; --size: 3px; --duration: 11s; --delay: -5s;  --drift: -24px; --twinkle-delay: -0.3s; }
    .particle:nth-child(15) { left: 59%; --size: 4px; --duration: 13s; --delay: -9s;  --drift: 36px; --twinkle-delay: -2.2s; }
    .particle:nth-child(16) { left: 63%; --size: 2px; --duration: 17s; --delay: -14s; --drift: -48px; --twinkle-delay: -1.6s; }
    .particle:nth-child(17) { left: 67%; --size: 5px; --duration: 12s; --delay: -3s;  --drift: 26px; --twinkle-delay: -0.8s; }
    .particle:nth-child(18) { left: 71%; --size: 3px; --duration: 19s; --delay: -15s; --drift: -36px; --twinkle-delay: -2.5s; }
    .particle:nth-child(19) { left: 75%; --size: 4px; --duration: 10s; --delay: -6s;  --drift: 44px; --twinkle-delay: -1.0s; }
    .particle:nth-child(20) { left: 79%; --size: 2px; --duration: 14s; --delay: -12s; --drift: -20px; --twinkle-delay: -2.9s; }
    .particle:nth-child(21) { left: 83%; --size: 6px; --duration: 16s; --delay: -8s;  --drift: 34px; --twinkle-delay: -1.3s; }
    .particle:nth-child(22) { left: 87%; --size: 3px; --duration: 11s; --delay: -4s;  --drift: -42px; --twinkle-delay: -0.2s; }
    .particle:nth-child(23) { left: 91%; --size: 4px; --duration: 18s; --delay: -16s; --drift: 24px; --twinkle-delay: -2.3s; }
    .particle:nth-child(24) { left: 95%; --size: 3px; --duration: 13s; --delay: -7s;  --drift: -32px; --twinkle-delay: -1.9s; }
    .particle:nth-child(25) { left: 6%;  --size: 2px; --duration: 20s; --delay: -18s; --drift: 55px; --twinkle-delay: -0.7s; }
    .particle:nth-child(26) { left: 13%; --size: 3px; --duration: 16s; --delay: -13s; --drift: -52px; --twinkle-delay: -2.7s; }
    .particle:nth-child(27) { left: 29%; --size: 5px; --duration: 21s; --delay: -20s; --drift: 48px; --twinkle-delay: -1.5s; }
    .particle:nth-child(28) { left: 46%; --size: 3px; --duration: 15s; --delay: -11s; --drift: -40px; --twinkle-delay: -0.5s; }
    .particle:nth-child(29) { left: 62%; --size: 2px; --duration: 19s; --delay: -17s; --drift: 58px; --twinkle-delay: -2.0s; }
    .particle:nth-child(30) { left: 73%; --size: 4px; --duration: 14s; --delay: -10s; --drift: -46px; --twinkle-delay: -1.2s; }
    .particle:nth-child(31) { left: 85%; --size: 3px; --duration: 22s; --delay: -19s; --drift: 36px; --twinkle-delay: -2.8s; }
    .particle:nth-child(32) { left: 98%; --size: 5px; --duration: 17s; --delay: -15s; --drift: -60px; --twinkle-delay: -0.9s; }

    @keyframes particleUp {
      0% {
        transform: translate3d(0, 0, 0) scale(0.65);
        opacity: 0;
      }
      12% {
        opacity: 0.9;
      }
      50% {
        transform: translate3d(calc(var(--drift, 25px) * 0.5), -55vh, 0) scale(1.05);
      }
      85% {
        opacity: 0.48;
      }
      100% {
        transform: translate3d(var(--drift, 25px), -112vh, 0) scale(1.45);
        opacity: 0;
      }
    }

    @keyframes particleTwinkle {
      0%, 100% { filter: brightness(0.8); }
      50% { filter: brightness(1.8); }
    }
  

    /* even particles: no empty waves */
    .particles {
      position: fixed;
      inset: 0;
      z-index: -80;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      opacity: var(--o);
      background: rgba(255, 255, 255, 0.88);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.65),
        0 0 24px var(--glow);
      animation:
        particleDrift var(--d) ease-in-out infinite alternate,
        particleBlink var(--b) ease-in-out infinite;
      animation-delay: var(--delay), var(--blink-delay);
    }

    @keyframes particleDrift {
      from {
        transform: translate3d(0, 0, 0) scale(0.85);
      }
      to {
        transform: translate3d(var(--dx), var(--dy), 0) scale(1.25);
      }
    }

    @keyframes particleBlink {
      0%, 100% {
        opacity: calc(var(--o) * 0.45);
        filter: brightness(0.85);
      }
      50% {
        opacity: var(--o);
        filter: brightness(1.7);
      }
    }
  

    .tabs {
      position: relative;
      z-index: 3;
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .tab-btn {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 8px 13px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .tab-btn:hover {
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.08);
    }

    .tab-btn.active {
      color: #fff;
      background: rgba(138, 43, 226, 0.22);
      border-color: rgba(138, 43, 226, 0.55);
      box-shadow: 0 0 18px rgba(138, 43, 226, 0.14);
    }

    .page {
      display: none;
      width: 100%;
    }

    .page.active {
      display: block;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .header-panel {
        flex-direction: column;
        align-items: center;
      }

      .tabs {
        width: 100%;
      }

      .tab-btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div id="enter-screen" onclick="startApp()">
    <div class="enter-text">Click to Enter</div>
  </div>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="./milana.mp4" type="video/mp4" />
  </video>

  <div class="bg-overlay"></div>

  <div class="particles" id="particles"></div>

  <audio id="bg-music" loop>
    <source src="./london.mp3" type="audio/mpeg" />
  </audio>

  <div class="audio-container">
    <div class="speaker-icon">
      <svg viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
      </svg>
    </div>
    <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="0.5" />
  </div>

  <main class="main-container" id="tilt-card">
    <section class="header-panel">
      <div class="user-block">
        <div class="avatar-container">
          <img src="./avatar.png" alt="Avatar" class="avatar" />
        </div>

        <div class="name-stack">
          <div class="nickname">Codein</div>
          <div class="mini-meta">bio · music · aesthetic</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="openTab('main', this)">Main</button>
        <button class="tab-btn" onclick="openTab('client', this)">Client</button>
      </div>
    </section>

    <section class="content-panel">
      <div class="content-inner">
        <div id="main" class="page active">
          <div class="section-label">Main About</div>
          <p class="desc">«Июнь не май, я пукни, ты поймай.»</p>
          <div class="decor-row"></div>
        </div>

        <div id="client" class="page">
          <div class="section-label">Client About</div>
          <p class="desc">Void DLC soon....</p>
          <div class="decor-row"></div>
        </div>
      </div>

      <div class="watermark">CODEIN</div>
    </section>
  </main>

  <script>
    const music = document.getElementById("bg-music");
    const volume = document.getElementById("volume");
    const card = document.getElementById("tilt-card");
    const video = document.getElementById("bg-video");
    const particlesContainer = document.getElementById("particles");

    function createParticles() {
      const colors = [
        "rgba(255, 255, 255, 0.65)",
        "rgba(130, 180, 255, 0.55)",
        "rgba(255, 130, 220, 0.42)",
        "rgba(160, 255, 225, 0.35)"
      ];

      particlesContainer.innerHTML = "";

      for (let i = 0; i < 85; i++) {
        const particle = document.createElement("span");
        particle.className = "particle";

        const size = Math.random() * 3.6 + 1.8;
        const opacity = Math.random() * 0.45 + 0.35;
        const duration = Math.random() * 3 + 3.5;
        const blinkDuration = Math.random() * 2.8 + 2.2;
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const dx = (Math.random() - 0.5) * 70;
        const dy = (Math.random() - 0.5) * 70;
        const glow = colors[Math.floor(Math.random() * colors.length)];

        particle.style.setProperty("--x", `${x}%`);
        particle.style.setProperty("--y", `${y}%`);
        particle.style.setProperty("--s", `${size}px`);
        particle.style.setProperty("--o", opacity.toFixed(2));
        particle.style.setProperty("--d", `${duration.toFixed(2)}s`);
        particle.style.setProperty("--b", `${blinkDuration.toFixed(2)}s`);
        particle.style.setProperty("--dx", `${dx.toFixed(1)}px`);
        particle.style.setProperty("--dy", `${dy.toFixed(1)}px`);
        particle.style.setProperty("--glow", glow);
        particle.style.setProperty("--delay", `${(-Math.random() * duration).toFixed(2)}s`);
        particle.style.setProperty("--blink-delay", `${(-Math.random() * blinkDuration).toFixed(2)}s`);

        particlesContainer.appendChild(particle);
      }
    }

    createParticles();

    music.volume = Number(volume.value);

    function startApp() {
      document.getElementById("enter-screen").classList.add("hidden");
      music.play().catch(() => {});
      video.play().catch(() => {});
    }

    volume.addEventListener("input", (event) => {
      music.volume = Number(event.target.value);
    });

    function openTab(tabId, button) {
      document.querySelectorAll(".page").forEach((page) => page.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      button.classList.add("active");
    }

    let isTiltActive = false;

    function applyTilt(event) {
      const xAxis = (window.innerWidth / 2 - event.clientX) / 18;
      const yAxis = (window.innerHeight / 2 - event.clientY) / 18;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      isTiltActive = true;
    }

    document.addEventListener("mousemove", applyTilt);

    document.addEventListener("mouseleave", () => {
      card.style.transform = "rotateY(0deg) rotateX(0deg)";
      isTiltActive = false;
    });

    window.addEventListener("blur", () => {
      card.style.transform = "rotateY(0deg) rotateX(0deg)";
      isTiltActive = false;
    });
  </script>
</body>
</html>
